services:
  # ── Kairon FastAPI backend ──────────────────────────────────────────────
  kairon-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kairon-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage          # flat-file persistence
      #- ./:/app                         # 👈 THE HOLE: Live source code mount
    environment:
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GNEWS_KEY=${GNEWS_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_WEBHOOK_URL=${BOT_WEBHOOK_URL}
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET}
      - NIM_API_KEY=${NIM_API_KEY}
      - NIM_BASE_URL=${NIM_BASE_URL}
      - NIM_MODEL=${NIM_MODEL}
      - NIM_MAX_TOKENS=${NIM_MAX_TOKENS}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}   # OpenRouter for analyzer
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434   # Ollama runs on host
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - N8N_TRIGGER_SECRET=${N8N_TRIGGER_SECRET}
      - MAX_CONCURRENT_LLM=${MAX_CONCURRENT_LLM:-1}    # SEQUENTIAL: 1 call at a time for OpenRouter rate limits
      - RELEVANCE_THRESHOLD=${RELEVANCE_THRESHOLD:-0.1}   # Very low threshold for testing
      - NEWSAPI_PAGE_SIZE=${NEWSAPI_PAGE_SIZE:-2}      # Conservative article limits for testing
      - GNEWS_MAX_RESULTS=${GNEWS_MAX_RESULTS:-1}      # Conservative article limits for testing
      - HACKER_NEWS_MAX_STORIES=${HACKER_NEWS_MAX_STORIES:-1}    # Conservative scraper limits for testing
      - ARS_TECHNICA_MAX_ARTICLES=${ARS_TECHNICA_MAX_ARTICLES:-1}  # Conservative scraper limits for testing
      - STORAGE_DIR=/app/storage
    networks:
      - kairon-net
    # Ollama runs on the host (not in Docker) so we use host.docker.internal.
    # On Linux, add: extra_hosts: ["host.docker.internal:host-gateway"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Kairon Telegram Bot (Polling Mode for Development) ───────────────────
  kairon-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kairon-bot
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage          # shared storage with API
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_WEBHOOK_URL=                # Force polling mode (empty)
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET}
      - STORAGE_DIR=/app/storage
      - PYTHONPATH=/app
    command: python bot/telegram_bot.py
    networks:
      - kairon-net
    depends_on:
      - kairon-api

  # ── n8n workflow orchestrator ───────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: kairon-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/home/node/.n8n/workflows:ro   # auto-import workflow.json on start
    environment:
      # Disable basic auth for portfolio/demo mode
      # For production, enable: N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - WEBHOOK_URL=${BOT_WEBHOOK_URL:-http://localhost:5678}
      # Expose Kairon API URL and secret as n8n env vars
      # These are referenced in the workflow as $env.KAIRON_API_URL etc.
      - KAIRON_API_URL=http://kairon-api:8000
      - N8N_TRIGGER_SECRET=${N8N_TRIGGER_SECRET}
    networks:
      - kairon-net
    depends_on:
      - kairon-api

volumes:
  n8n_data:

networks:
  kairon-net:
    driver: bridge
